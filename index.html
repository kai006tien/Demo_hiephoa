<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Cổng Thông Tin Điện Tử</title>
  <meta name="description" content="Hệ thống quản trị nội bộ - Cổng Thông Tin Điện Tử Hiệp Hòa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
</head>
<body>
  <div class="login-page">
    <div class="login-decoration login-decoration--trongdong"></div>
    <!-- Header -->
    <div class="login-header animate-fadeInDown">
      <img class="login-header__logo" src="logo.svg" alt="Quốc huy Việt Nam">
      <h1 class="login-header__title">Cổng Thông Tin Điện Tử</h1>
      <p class="login-header__subtitle">HỆ THỐNG QUẢN TRỊ HỘI ĐỒNG NHÂN DÂN XÃ HIỆP HÒA - TỈNH TÂY NINH</p>
    </div>

    <!-- Login Form -->
    <div class="login-container">
      <div class="login-card">
        <h2 class="login-card__title">Đăng nhập</h2>
        <p class="login-card__desc">Vui lòng nhập thông tin tài khoản để truy cập hệ thống</p>

        <div class="login-error" id="login-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          <span id="login-error-text"></span>
        </div>

        <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="login-username">Tên đăng nhập</label>
            <div class="input-icon-wrapper">
              <input class="form-input" type="text" id="login-username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Mật khẩu</label>
            <div class="input-icon-wrapper">
              <input class="form-input" type="password" id="login-password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <button type="button" class="password-toggle" onclick="togglePassword()" id="password-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-login" id="btn-login">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            ĐĂNG NHẬP
          </button>
        </form>

        <div style="margin-top: var(--space-4); text-align: center;">
          <p style="font-size: 11px; color: var(--color-text-muted);">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="vertical-align: middle; margin-right: 4px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Kết nối được bảo mật bằng mã hóa đầu-cuối
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      © 2026 Cổng Thông Tin Điện Tử - Hệ thống Quản trị Nội bộ
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // KHÔNG gọi Sync.init() trên trang login
    // KHÔNG gọi Storage.initializeDefaultData() - dữ liệu do server quản lý

    // If already logged in, redirect
    if (Auth.isLoggedIn()) {
      const session = Auth.getSession();
      window.location.href = session.role === 'admin' ? 'admin.html' : 'user.html';
    }

    // Handle login - ASYNC, gọi API server
    async function handleLogin(e) {
      e.preventDefault();

      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('btn-login');
      const errorEl = document.getElementById('login-error');
      const errorText = document.getElementById('login-error-text');

      // Disable button while processing
      btn.innerHTML = '<span class="animate-spin" style="display:inline-block;">⏳</span> Đang xác thực...';
      btn.disabled = true;
      errorEl.classList.remove('show');

      const result = await Auth.login(username, password);

      if (result.success) {
        btn.innerHTML = '<span class="animate-spin" style="display:inline-block;">✅</span> Đăng nhập thành công!';
        setTimeout(() => {
          window.location.href = result.session.role === 'admin' ? 'admin.html' : 'user.html';
        }, 400);
      } else {
        errorText.textContent = result.message;
        errorEl.classList.add('show');
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          ĐĂNG NHẬP`;
        btn.disabled = false;

        // Shake animation
        const card = document.querySelector('.login-card');
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = '';
      }
    }

    // Toggle password visibility
    function togglePassword() {
      const input = document.getElementById('login-password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // Focus on username input
    document.getElementById('login-username').focus();
  </script>
</body>
</html>
